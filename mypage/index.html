<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You Are Everything To Me</title>
    
    <link rel="icon" type="image/gif" href="https://i.ibb.co/VDQLvp6/original.gif">
    <meta name="theme-color" content="black">
    
    <link href="https://fonts.googleapis.com/css?family=Merienda|Ranga|Mali:400i,700i&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>
        /* Mencegah scroll dan interaksi zoom di seluruh body */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah scroll */
            touch-action: none; /* Mematikan gesture zoom/pan di level browser */
            background: #000 url("https://1.bp.blogspot.com/-Tk57OKcT6FY/YMMsNk371fI/AAAAAAAAEJs/D9_w05VqdRElC6NPlmBJrQBzE0ik2AsvQCLcBGAsYHQ/s1247/Mas_Rahmat.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Full Layar HP */
        .mobile-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(96, 90, 82, 0.2);
            z-index: -1;
        }

        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px 15px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
            width: 100%;
            max-width: 400px; /* Menjaga agar konten tidak terlalu lebar di tablet */
            margin: auto;
        }

        h2 { font-family: 'Mali', sans-serif; font-size: 22px; font-weight: bold; }
        h3 { font-family: 'Mali', sans-serif; font-size: 14px; opacity: 0.8; margin-top: 10px; }
        h5 { font-family: 'Mali'; font-size: 18px; margin-bottom: 0; }
        
        marquee {
            font-family: 'Mali', sans-serif;
            font-style: italic;
            margin: 15px 0;
            color: #ffeb3b; /* Warna kuning agar lebih terbaca */
        }

        .btn-play {
            background-color: #191919;
            width: 100%;
            max-width: 200px;
            padding: 12px;
            border-radius: 25px;
            font-family: 'Mali', sans-serif;
            font-size: 1em;
            color: #FFFFFF;
            font-weight: 700;
            border: none;
            border-bottom: 4px solid #333;
            cursor: pointer;
            outline: none;
        }

        .btn-play:active {
            transform: scale(0.98);
            border-bottom: 2px solid #333;
        }

        .social-icons { margin-top: 20px; }
        .social-icons i {
            font-size: 22px;
            color: #fff;
            margin: 0 12px;
        }

        hr { border-top: 1px solid rgba(255,255,255,0.2); margin: 20px auto; width: 80%; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="bg-overlay"></div>
        
        <div class="content-box">
            <h2>"You Are Everything To Me"</h2>
            <br>
            <h5>Rahmat :</h5>
            <marquee scrollamount="5">
                " Mencintai merupakan sebuah anugerah besar yang Tuhan berikan kepada manusia. "
            </marquee>
            
            <hr>
            
            <h3>Contact: Rahmat.Ofc@gmail.com</h3>
            
            <button class="btn-play" onclick="play()">Play Music</button>
            <audio id="audios" src="sedia-aku-sebelum-hujan.mp3"></audio>

            <div class="social-icons">
                <a href="http://fb.com/rahmat.ofc"><i class="fa fa-facebook"></i></a>
                <a href="#"><i class="fa fa-github"></i></a>
                <a href="#"><i class="fa fa-youtube"></i></a>
                <a href="#"><i class="fa fa-instagram"></i></a>
                <a href="#"><i class="fa fa-twitter"></i></a>
            </div>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/bungfrangki/efeksalju/2a7805c7/efek-salju.js"></script>
    <script>
        function play() {
            var audio = document.getElementById("audios");
            audio.play();
        }
        
        // Mencegah double tap zoom via JS sebagai tambahan pengaman
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
