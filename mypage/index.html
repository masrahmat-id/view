<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You Are Everything To Me</title>
    
    <link rel="icon" type="image/gif" href="https://i.ibb.co/VDQLvp6/original.gif">
    <meta name="theme-color" content="black">
    
    <link href="https://fonts.googleapis.com/css?family=Merienda|Ranga|Mali:400i,700i&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background: #000 url("https://1.bp.blogspot.com/-Tk57OKcT6FY/YMMsNk371fI/AAAAAAAAEJs/D9_w05VqdRElC6NPlmBJrQBzE0ik2AsvQCLcBGAsYHQ/s1247/Mas_Rahmat.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Mali', sans-serif;
            cursor: pointer;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Protokol Menghilangkan Kursor Saat Fullscreen */
        :fullscreen, :fullscreen * {
            cursor: none !important;
        }
        :-webkit-full-screen, :-webkit-full-screen * {
            cursor: none !important;
        }
        :-moz-full-screen, :-moz-full-screen * {
            cursor: none !important;
        }
        :-ms-fullscreen, :-ms-fullscreen * {
            cursor: none !important;
        }

        .mobile-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 35px 20px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
            width: 100%;
            max-width: 400px;
            margin: auto;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
        }

        h2 { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        h5 { font-size: 18px; margin-bottom: 5px; color: #eee; }
        
        marquee {
            margin: 15px 0;
            color: #ffeb3b;
            font-weight: 500;
        }

        .btn-play {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 220px;
            padding: 15px;
            border-radius: 30px;
            color: #FFFFFF;
            font-weight: 700;
            border: none;
            border-bottom: 4px solid #000;
            cursor: pointer;
            outline: none;
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        .social-icons { margin-top: 25px; }
        .social-icons i {
            font-size: 22px;
            color: #fff;
            margin: 0 12px;
            opacity: 0.8;
        }

        hr { border-top: 1px solid rgba(255,255,255,0.2); margin: 25px auto; width: 70%; }
    </style>
</head>
<body onclick="goFullScreen()">

    <div class="mobile-container">
        <div class="content-box">
            <h2>"You Are Everything To Me"</h2>
            <h5>My Music Page</h5>
            <marquee scrollamount="5">
                " Mencintai merupakan sebuah anugerah besar yang Tuhan berikan kepada manusia. Kita perlu menjaga segala anugerah itu. "
            </marquee>
            
            <hr>
            
            <button class="btn-play" onclick="event.stopPropagation(); playMusic();">
                <i class="fa fa-play"></i>   Play Music
            </button>
            <audio id="audios" src="sedia-aku-sebelum-hujan.mp3" loop></audio>

            <div class="social-icons">
                <a href="#"><i class="fa fa-facebook"></i></a>
                <a href="#"><i class="fa fa-github"></i></a>
                <a href="#"><i class="fa fa-youtube"></i></a>
                <a href="#"><i class="fa fa-instagram"></i></a>
                <a href="#"><i class="fa fa-twitter"></i></a>
            </div>
            
            <h3 style="font-size: 12px; opacity: 0.5; margin-top: 20px;">Contact: masrahmat.id@gmail.com</h3>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/bungfrangki/efeksalju/2a7805c7/efek-salju.js"></script>

    <script>
        function goFullScreen() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        function playMusic() {
            var audio = document.getElementById("audios");
            audio.play();
            goFullScreen();
        }

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
