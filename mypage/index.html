<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are Everything To Me</title>
    <meta name="description" content="[ 16.06 ]">
    <link rel="icon" type="image/gif" href="https://i.ibb.co/VDQLvp6/original.gif">
    <meta name="theme-color" content="black">
    
    <link href="https://fonts.googleapis.com/css?family=Merienda|Ranga|Mali:400i,700i&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url("https://1.bp.blogspot.com/-Tk57OKcT6FY/YMMsNk371fI/AAAAAAAAEJs/D9_w05VqdRElC6NPlmBJrQBzE0ik2AsvQCLcBGAsYHQ/s1247/Mas_Rahmat.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Membatasi ukuran layar seperti HP */
        .mobile-container {
            width: 100%;
            max-width: 450px; /* Ukuran standar HP */
            height: 90vh;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(96, 90, 82, 0.2);
            z-index: -1;
        }

        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px 15px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
        }

        h1 { font-family: 'Ranga', cursive; font-size: 45px; margin-bottom: 10px; }
        h2 { font-family: 'Mali', sans-serif; font-size: 24px; }
        h3 { font-family: 'Mali', sans-serif; font-size: 16px; opacity: 0.8; }
        h5 { font-family: 'Mali'; font-size: 18px; }
        p { font-family: 'Merienda', cursive; font-size: 16px; }

        marquee {
            font-style: italic;
            margin: 20px 0;
        }

        .btn-play {
            display: inline-block;
            background-color: #191919;
            width: 80%;
            margin-top: 25px;
            padding: 12px;
            border-radius: 25px;
            font-family: 'Mali', sans-serif;
            font-size: 1.1em;
            color: #FFFFFF;
            font-weight: 700;
            border: none;
            border-bottom: 4px solid #333;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-play:active {
            transform: translateY(2px);
            border-bottom: 2px solid #333;
        }

        .social-icons i {
            font-size: 24px;
            color: #fff;
            margin: 15px 10px;
            transition: 0.3s;
        }

        .social-icons i:hover {
            color: #ccc;
            transform: scale(1.1);
        }

        hr { border-top: 1px solid rgba(255,255,255,0.2); width: 80%; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="bg-overlay"></div>
        
        <div class="content-box">
            <h2>"You Are Everything To Me"</h2>
            <br>
            <h5>Rahmat :</h5>
            <marquee scrollamount="5">
                " Mencintai merupakan sebuah anugerah besar yang Tuhan berikan kepada manusia. Maka dari itu, kita perlu senantiasa bersyukur dan menjaga segala anugerah itu. "
            </marquee>
            
            <hr>
            
            <h3>Contact: Rahmat.Ofc@gmail.com</h3>
            
            <button class="btn-play" onclick="play()">Play Music</button>
            <audio id="audios" src="sedia-aku-sebelum-hujan.mp3"></audio>

            <div class="social-icons">
                <a href="http://fb.com/rahmat.ofc"><i class="fa fa-facebook"></i></a>
                <a href="#"><i class="fa fa-github"></i></a>
                <a href="#"><i class="fa fa-youtube"></i></a>
                <a href="#"><i class="fa fa-instagram"></i></a>
                <a href="#"><i class="fa fa-twitter"></i></a>
            </div>
        </div>
    </div>

    <script src="https://cdn.rawgit.com/bungfrangki/efeksalju/2a7805c7/efek-salju.js" type="text/javascript"></script>
    <script>
        function play() {
            var audio = document.getElementById("audios");
            audio.play();
        }
    </script>
</body>
</html>
